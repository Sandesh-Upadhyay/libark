# 🎯 Paid機能関連のGraphQL Mutation

# 投稿購入
mutation PurchasePost($input: PurchasePostInput!) {
  purchasePost(input: $input) {
    id
    userId
    postId
    price
    purchasedAt
    expiresAt
    isActive
    user {
      id
      username
      displayName
    }
    post {
      id
      content
      visibility
      price
      paidAt
      user {
        id
        username
        displayName
      }
    }
  }
}

# 投稿をPaid化
mutation UpdatePostToPaid($input: UpdatePostToPaidInput!) {
  updatePostToPaid(input: $input) {
    id
    content
    visibility
    price
    paidAt
    isProcessing
    createdAt
    updatedAt
    user {
      id
      username
      displayName
      profileImageId
    }
    media {
      id
      filename
      s3Key
      mimeType
      fileSize
      width
      height
      status

      variants {
        id
        type
        s3Key
        width
        height
        fileSize
        quality
      }
    }
    likesCount
    commentsCount
    viewsCount
    isLikedByCurrentUser
    isPurchasedByCurrentUser
  }
}

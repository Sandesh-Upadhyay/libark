events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    upstream s3_gateway {
        server s3-gateway:8080;
    }

    server {
        listen 80;
        server_name localhost 127.0.0.1 _;

        include /etc/nginx/snippets/upload_tuning.conf;

        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        location /@vite/ {
            proxy_pass http://frontend;
            include /etc/nginx/snippets/proxy_headers.conf;
            include /etc/nginx/snippets/websocket_headers.conf;
            proxy_read_timeout 86400;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        location /@fs/ {
            proxy_pass http://frontend;
            include /etc/nginx/snippets/proxy_headers.conf;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        location /vite-hmr {
            proxy_pass http://frontend;
            include /etc/nginx/snippets/proxy_headers.conf;
            include /etc/nginx/snippets/websocket_headers.conf;
            proxy_read_timeout 86400;
        }

        location /src/ {
            proxy_pass http://frontend;
            include /etc/nginx/snippets/proxy_headers.conf;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        location /assets/ {
            proxy_pass http://frontend;
            include /etc/nginx/snippets/proxy_headers.conf;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /node_modules/ {
            proxy_pass http://frontend;
            include /etc/nginx/snippets/proxy_headers.conf;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        location /graphql {
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy_headers.conf;
            include /etc/nginx/snippets/websocket_headers.conf;
        }

        location /api/ {
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy_headers.conf;
            proxy_set_header Cookie $http_cookie;
        }

        location ^~ /upload/ {
            limit_except PUT OPTIONS { deny all; }

            set $cors_origin "";
            if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$") {
                set $cors_origin $http_origin;
            }

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "PUT,OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization,Content-Type,Content-Length" always;
                add_header Access-Control-Max-Age 86400 always;
                return 204;
            }

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;

            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_request_buffering off;
            proxy_buffering off;

            include /etc/nginx/snippets/proxy_headers.conf;
            proxy_set_header Authorization $http_authorization;
            proxy_pass http://s3_gateway;
        }

        location = /upload {
            return 404;
        }

        location /api/media/ {
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy_headers.conf;
            proxy_set_header Cookie $http_cookie;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        location /files/media/ {
            proxy_pass http://s3_gateway;
            include /etc/nginx/snippets/proxy_headers.conf;
        }

        location /ogp/ {
            proxy_pass http://s3_gateway;
            include /etc/nginx/snippets/proxy_headers.conf;
            proxy_pass_header Cache-Control;
            proxy_pass_header Expires;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        location /encryption/ {
            proxy_pass http://s3_gateway;
            include /etc/nginx/snippets/proxy_headers.conf;
        }

        location /webhook/ {
            proxy_pass http://s3_gateway;
            include /etc/nginx/snippets/proxy_headers.conf;
            proxy_request_buffering off;
            proxy_buffering off;
            client_max_body_size 10M;
        }

        location / {
            proxy_pass http://frontend;
            include /etc/nginx/snippets/proxy_headers.conf;
            include /etc/nginx/snippets/websocket_headers.conf;
            proxy_read_timeout 86400;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}

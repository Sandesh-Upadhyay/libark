# LibArk Production Nginx Configuration
# Optimized for performance and security

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Worker connections and file limits
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 🔧 動的DNS解決設定（Docker内部DNS）
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    include /etc/nginx/snippets/upload_tuning.conf;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

    # 🔧 Upstream servers - 動的DNS解決対応
    # Note: 動的DNS解決のため、proxy_pass で直接変数を使用

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name libark.io www.libark.io;

        # 🏥 Health check for load balancers
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 🔍 Nginx internal health check
        location /nginx-health {
            access_log off;
            set $backend_upstream http://backend:8000/health;

            # Backend health check
            proxy_pass $backend_upstream;
            include /etc/nginx/snippets/proxy_headers.conf;
            proxy_connect_timeout 2s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS server with Cloudflare SSL
    server {
        listen 443 ssl;
        http2 on;
        server_name libark.io www.libark.io;

        # Cloudflare SSL configuration
        ssl_certificate /etc/nginx/ssl/cloudflare.crt;
        ssl_certificate_key /etc/nginx/ssl/cloudflare.key;

        # SSL security settings optimized for Cloudflare
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Trust Cloudflare proxy
        set_real_ip_from 103.21.244.0/22;
        set_real_ip_from 103.22.200.0/22;
        set_real_ip_from 103.31.4.0/22;
        set_real_ip_from 104.16.0.0/13;
        set_real_ip_from 104.24.0.0/14;
        set_real_ip_from 108.162.192.0/18;
        set_real_ip_from 131.0.72.0/22;
        set_real_ip_from 141.101.64.0/18;
        set_real_ip_from 162.158.0.0/15;
        set_real_ip_from 172.64.0.0/13;
        set_real_ip_from 173.245.48.0/20;
        set_real_ip_from 188.114.96.0/20;
        set_real_ip_from 190.93.240.0/20;
        set_real_ip_from 197.234.240.0/22;
        set_real_ip_from 198.41.128.0/17;
        set_real_ip_from 2400:cb00::/32;
        set_real_ip_from 2606:4700::/32;
        set_real_ip_from 2803:f800::/32;
        set_real_ip_from 2405:b500::/32;
        set_real_ip_from 2405:8100::/32;
        set_real_ip_from 2c0f:f248::/32;
        set_real_ip_from 2a06:98c0::/29;
        real_ip_header CF-Connecting-IP;

        # HSTS (handled by Cloudflare, but adding for redundancy)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API routes to backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            # 🔧 動的DNS解決対応
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            include /etc/nginx/snippets/proxy_headers.conf;
            include /etc/nginx/snippets/websocket_headers.conf;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # GraphQL endpoint
        location /graphql {
            limit_req zone=api burst=20 nodelay;

            # 🔧 動的DNS解決対応
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            include /etc/nginx/snippets/proxy_headers.conf;
            include /etc/nginx/snippets/websocket_headers.conf;
        }

        # WebSocket support
        location /ws {
            # 🔧 動的DNS解決対応
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            include /etc/nginx/snippets/proxy_headers.conf;
            include /etc/nginx/snippets/websocket_headers.conf;

            # WebSocket specific timeouts
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Worker admin panel (restricted access)
        location /admin/queues {
            # Add IP restriction here if needed
            # allow 192.168.1.0/24;
            # deny all;

            # 🔧 動的DNS解決対応
            set $worker_upstream http://worker:8100;
            proxy_pass $worker_upstream;
            include /etc/nginx/snippets/proxy_headers.conf;
        }

        # Block access to source files and packages
        location /packages/ {
            return 404;
        }

        location /src/ {
            return 404;
        }

        # Block access to TypeScript source files
        location ~ \.ts$ {
            return 404;
        }

        # Block access to security modules specifically
        location ~ /security/ {
            return 404;
        }

        # Static assets with cache busting for debugging
        location /assets/ {
            # 🔧 動的DNS解決対応
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            include /etc/nginx/snippets/proxy_headers.conf;

            # 接続タイムアウト設定
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Completely disable caching to prevent stale JavaScript files
            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "Thu, 01 Jan 1970 00:00:00 GMT" always;
            add_header Last-Modified "" always;
            # Remove ETag header
            proxy_hide_header ETag;
            add_header ETag "" always;
        }

        # Default route - Frontend Vite application
        location / {
            # 🔧 動的DNS解決対応
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            include /etc/nginx/snippets/proxy_headers.conf;
            include /etc/nginx/snippets/websocket_headers.conf;

            # 接続タイムアウト設定
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Completely disable caching for HTML files to ensure fresh content
            add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "Thu, 01 Jan 1970 00:00:00 GMT" always;
            add_header Last-Modified "" always;
            # Remove ETag header
            proxy_hide_header ETag;
            add_header ETag "" always;


        }
    }
}
